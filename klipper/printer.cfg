# Klipper configuration for Creality Ender 5 S1
# Based on stock hardware + CR Touch probe
# Docs: https://www.klipper3d.org/Config_Reference.html

[stepper_x]
step_pin: PC2
dir_pin: PB9
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: PA5
position_endstop: 220
position_max: 220
homing_speed: 50

[stepper_y]
step_pin: PB8
dir_pin: PB7
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: PA6
position_endstop: 220
position_max: 220
homing_speed: 50

[stepper_z]
step_pin: PB6
dir_pin: !PB5
enable_pin: !PC3
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_min: -5
position_max: 280
homing_speed: 4
second_homing_speed: 1
homing_retract_dist: 2.0

[extruder]
step_pin: PB4
dir_pin: PB3
enable_pin: !PC3
microsteps: 16
rotation_distance: 7.53        # Calibrate with e-steps test
nozzle_diameter: 0.4
filament_diameter: 1.75
heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC5
min_temp: 0
max_temp: 300
max_extrude_only_distance: 100.0
pressure_advance: 0.05         # Tune with pressure advance test

[heater_bed]
heater_pin: PA7
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
min_temp: 0
max_temp: 130

[fan]
pin: PA0

[mcu]
serial: /dev/serial/by-id/<YOUR_MCU_SERIAL_ID>
# Find with: ls /dev/serial/by-id/

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100

# CR Touch / BL Touch probe
[bltouch]
sensor_pin: ^PB1
control_pin: PB0
x_offset: -31.8
y_offset: -40.5
z_offset: 0               # Set after running PROBE_CALIBRATE
speed: 10
lift_speed: 20
samples: 2

[safe_z_home]
home_xy_position: 141.8, 150.5  # Center of bed + probe offset
speed: 100
z_hop: 10
z_hop_speed: 5

[bed_mesh]
speed: 120
horizontal_move_z: 5
mesh_min: 15, 15
mesh_max: 185, 175
probe_count: 5, 5
algorithm: bicubic

# PID tuning - run PID_CALIBRATE HEATER=extruder TARGET=230
[pid_calibrate]

[virtual_sdcard]
path: ~/printer_data/gcodes

[display_status]
[pause_resume]

[gcode_macro PAUSE]
description: Pause the running print
rename_existing: PAUSE_BASE
gcode:
    PAUSE_BASE
    G91
    G1 Z5 F600
    G90

[gcode_macro RESUME]
description: Resume the paused print
rename_existing: RESUME_BASE
gcode:
    RESUME_BASE

[gcode_macro CANCEL_PRINT]
description: Cancel the running print
rename_existing: CANCEL_PRINT_BASE
gcode:
    CANCEL_PRINT_BASE
    G91
    G1 Z10 F600
    G90
    G1 X0 Y220 F3000
    M104 S0
    M140 S0
    M84

# Temperature profiles
[gcode_macro PREHEAT_PLA]
gcode:
    M104 S210
    M140 S60

[gcode_macro PREHEAT_PETG]
gcode:
    M104 S235
    M140 S85
